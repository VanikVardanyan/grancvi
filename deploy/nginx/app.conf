# /etc/nginx/sites-available/app.grancvi.am
# Symlink into sites-enabled, then reload nginx.
# certbot --nginx -d app.grancvi.am will auto-inject the SSL block.

server {
    listen 80;
    listen [::]:80;
    server_name app.grancvi.am;

    root /var/www/jampord-app;
    index index.html;

    # SPA routing — any unknown path returns index.html so React Router can pick up.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable build artifacts aggressively; the bundler hashes filenames
    # so safe to cache long-term. index.html itself is always re-fetched.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    server_tokens off;
}
