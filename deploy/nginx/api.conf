# /etc/nginx/sites-available/api.jampord.am
# Symlink into sites-enabled, then reload nginx.
# certbot --nginx -d api.jampord.am will auto-inject the SSL block.

server {
    listen 80;
    listen [::]:80;
    server_name api.jampord.am;

    # Certbot ACME challenge path (covered by the default server) — no-op here.

    # After `certbot --nginx -d api.jampord.am` runs, the block below becomes
    # the HTTPS server and the HTTP server gets a 301 redirect automatically.

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Basic hardening
    server_tokens off;
    client_max_body_size 64k;
    client_body_timeout 15s;
}
