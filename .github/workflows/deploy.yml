name: deploy

on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/tg-bot
            git fetch --all --tags --prune
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            # Run migrations to head BEFORE restarting services so the API
            # never queries against a stale schema. The bot container's
            # CMD also runs alembic upgrade head — harmless no-op once
            # we're already current.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
            echo "=== deployed $(git rev-parse --short HEAD) ==="
