services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: botik
      POSTGRES_PASSWORD: botik
      POSTGRES_DB: botik
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botik -d botik"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://botik:botik@postgres:5432/botik
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

volumes:
  pg_data:
